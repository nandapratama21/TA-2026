project:
  name: nr-iqa-genimage
  task: binary_classification
  primary_dataset: genimage

data:
  manifest_path: data/genimage_manifest_biggan_midjourney_cat4_train.csv
  image_root: data/raw/genimage
  subset_name: biggan_midjourney_cat4_train

model:
  clip_model: openai/clip-vit-base-patch32
  fusion: concatenate

features:
  fft_mean:
    fields: [fft_mag_mean, fft_phase_mean, fft_phase_cos_mean, fft_phase_sin_mean]
  clip:
    freeze_backbone: true
    out_dim: 64
  nriqa:
    fields: [piqe, brisque, niqe]
